<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <h1>Snake Game</h1>
      <p class="subtitle">Use arrow keys or WASD to move. Eat food, avoid walls and yourself.</p>

      <section class="hud" aria-label="Game info">
        <div><span>Score:</span> <strong id="score">0</strong></div>
        <div><span>Best:</span> <strong id="best-score">0</strong></div>
        <div><span>Speed:</span> <strong id="speed">1x</strong></div>
      </section>

      <canvas id="game" width="480" height="480" aria-label="Snake game board" role="img"></canvas>

      <section class="controls">
        <button id="start-btn" type="button">Start / Restart</button>
        <button id="pause-btn" type="button">Pause</button>
      </section>

      <p id="message" class="message">Press <kbd>Start</kbd> to play.</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
